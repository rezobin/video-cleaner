<!DOCTYPE html>
<html>
<head>
  <title>Talklean</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --coral: #ff5a5f;
      --blue: #2563eb;
      --bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 550px;
      margin: 0 auto;
      padding: 16px;
    }

    /* NAV */
    .navbar {
      position: sticky;
      top: 0;
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-weight: 800;
      color: var(--coral);
    }

    .nav-cta {
      background: var(--coral);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
      font-size: 18px;
      padding: 12px 16px;
    }

    /* HERO */
    .hero {
      margin: 20px 0;
    }

    .hero h1 {
      font-size: 22px;
    }

    .hero p {
      color: var(--muted);
      margin: 4px 0;
    }

    /* FILE INPUT */
    input[type="file"] {
      display: none;
    }

    .file-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: white;
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      max-width: 160px;
    }

    button {
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      cursor: pointer;
      max-width: 220px;
      font-weight: 600;
      font-size: 16px;
    }

    .primary {
      background: var(--coral);
      color: white;
      border: none;
      display: block;
      margin: 10px auto;
      font-weight: 800;
      font-size: 18px;
      padding: 14px 18px;
    }

    /* PREVIEW */
    #preview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .file-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .video-wrapper {
      width: 200px;
      height: 200px;
      overflow: hidden;
      border-radius: 10px;
      background: black;
    }

    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* PROGRESS */
    #progress-container {
      margin-top: 10px;
      background: #eee;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--coral);
    }

    /* -------------------------
      AUTH CLEAN UI
    -------------------------- */

    .auth-section {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .auth-subtitle {
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* input + button inline */
    .auth-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* email input stylé */
    .auth-row input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      font-size: 14px;
    }

    .auth-row input:focus {
      border-color: var(--coral);
    }

    /* login button */
    .auth-row button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: var(--coral);
      color: white;
      cursor: pointer;
      max-width: 100px;
      white-space: nowrap;
    }

    /* mobile stack */
    @media (max-width: 600px) {
      .auth-row {
        flex-direction: column;
        align-items: stretch;
      }

      .auth-row button {
        max-width: 100%;
      }
    }

    @media (max-width: 600px) {
      #preview { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="brand">talklean</div>
  <button class="nav-cta" onclick="openFilePicker()">Try now</button>
</div>

<div class="container">

  <div class="hero">
    <h1>Transform your raw videos into TikTok-ready clips</h1>
    <p>No editing required</p>
    <p>No weird AI</p>
    <p>Just you, enhanced</p>
  </div>

  <label class="file-btn" for="fileInput">Choose files</label>
  <input id="fileInput" type="file" multiple accept="video/*">

  <button class="primary" onclick="upload()">Generate watchable content</button>

  <p id="status"></p>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <a id="download" style="display:none" target="_blank"></a>

  <div id="preview"></div>

  <!-- AUTH -->
  <div id="auth-section" class="auth-section">
    <h2>Access</h2>

    <p class="auth-subtitle">
      Generate more clean talking videos 
    </p>

    <div class="auth-row">
      <input id="email" type="email" placeholder="Enter your email" />
      <button onclick="login()">Login</button>
    </div>

    <div id="user-info" style="display:none">
      Connected as <span id="user-email"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./app.js"></script>

</body>
</html>
