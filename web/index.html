<!DOCTYPE html>
<html>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="email" />
<button onclick="login()">Send Magic Link</button>

<h2>Upload</h2>

<input type="file" id="files" multiple />
<button onclick="upload()">Upload</button>

<p id="status"></p>

<a id="download" style="display:none">Download</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseClient = supabase.createClient(
  "https://mgsngnapsfafydspfmnt.supabase.co",
  "sb_publishable_DGfn4J71yW2U6oY7beHGDg_Wptvc0Wy"
)

let session = null

// -------------------------
// AUTH
// -------------------------

async function login() {
  const email = document.getElementById("email").value

  await supabaseClient.auth.signInWithOtp({
    email: email,
    options: {
      emailRedirectTo: "http://localhost:5500"
    }
  })

  alert("Check your email")
}

supabaseClient.auth.onAuthStateChange((event, sess) => {
  session = sess
  console.log("SESSION:", session)
})

// -------------------------
// UPLOAD
// -------------------------

async function upload() {

  if (!session || !session.access_token) {
    alert("login first")
    return
  }

  console.log("TOKEN:", session.access_token)

  const files = document.getElementById("files").files
  const form = new FormData()

  for (let f of files) {
    form.append("files", f)
  }

  const res = await fetch("http://localhost:8000/upload", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + session.access_token
    },
    body: form
  })

  const data = await res.json()
  console.log("UPLOAD RESPONSE:", data)

  if (!data.job_id) {
    alert("Upload failed")
    return
  }

  poll(data.job_id)
}

// -------------------------
// STATUS
// -------------------------

async function poll(jobId) {

  const interval = setInterval(async () => {

    const res = await fetch(`http://localhost:8000/status/${jobId}`, {
      headers: {
        "Authorization": "Bearer " + session.access_token
      }
    })

    const data = await res.json()

    document.getElementById("status").innerText = data.status

    if (data.status === "done") {
      clearInterval(interval)

      const a = document.getElementById("download")
      a.href = `http://localhost:8000/download/${jobId}`
      a.style.display = "block"
      a.innerText = "DOWNLOAD"
    }

    if (data.status === "failed") {
      clearInterval(interval)
      document.getElementById("status").innerText = "FAILED"
    }

  }, 1500)
}

</script>

</body>
</html>
