<!DOCTYPE html>
<html>
<head>
  <title>Video Cleaner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
    }

    video {
      border-radius: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      margin: 5px;
      padding: 6px 10px;
      cursor: pointer;
    }

    #preview {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>Login</h2>

<input id="email" type="email" placeholder="email" />
<button onclick="login()">Login</button>

<hr/>

<h2>Upload videos</h2>

<input id="files" type="file" multiple accept="video/*" />
<button onclick="upload()">Upload</button>

<p id="status"></p>

<a id="download" style="display:none" target="_blank">Download final video</a>

<h3>Preview</h3>
<div id="preview"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./app.js"></script>

</body>
</html>
