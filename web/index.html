<!DOCTYPE html>
<html>
<head>
  <title>Talklean</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: system-ui;
  margin: 0;
  padding: 16px;
  background: #fafafa;
}

/* -------------------------
   LAYOUT
------------------------- */

.container {
  max-width: 720px;
  margin: auto;
}

/* -------------------------
   TYPO
------------------------- */

h2 {
  font-size: 18px;
  margin: 20px 0 10px;
}

/* -------------------------
   INPUTS
------------------------- */

input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* -------------------------
   BUTTONS (FIX CRITIQUE)
------------------------- */

button {
  display: inline-block;        /* 🔥 évite stretch */
  width: auto;                  /* 🔥 FIX principal */
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
}

button.primary {
  background: #ff5a5f; /* corail */
  color: white;
  border: none;
}

/* -------------------------
   PREVIEW GRID
------------------------- */

#preview {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
}

.file-item {
  border: 1px solid #eee;
  border-radius: 12px;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

video {
  width: 100%;
  max-width: 100%;
  border-radius: 10px;
}

/* -------------------------
   ACTION BUTTONS UNDER VIDEO
------------------------- */

.file-actions {
  display: flex;
  gap: 6px;
  justify-content: space-between;
}

.file-actions button {
  flex: 1;              /* petits boutons alignés */
  padding: 6px;
}

/* -------------------------
   PROGRESS BAR
------------------------- */

#progress-container {
  margin-top: 10px;
}

#progress-container > div {
  width: 100%;
  background: #eee;
  border-radius: 8px;
  height: 10px;
}

#progress-bar {
  height: 10px;
  width: 0%;
  background: #ff5a5f;
  border-radius: 8px;
  transition: width 0.3s ease;
}

/* -------------------------
   MOBILE (IMPORTANT)
------------------------- */

@media (max-width: 600px) {

  body {
    padding: 12px;
  }

  h2 {
    font-size: 16px;
  }

  button {
    padding: 10px;
  }

  #preview {
    grid-template-columns: 1fr; /* 🔥 une colonne mobile */
  }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Talklean</div>
  <button class="cta" onclick="scrollToApp()">Start free</button>
</div>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>Make your videos actually watchable</h1>
  <p>Remove silences. Keep your flow. No editing required.</p>

  <button onclick="scrollToApp()">Start cleaning videos</button>

  <div class="benefits">
    <div>No editing</div>
    <div>No weird AI</div>
    <div>Just you, enhanced</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

  <div id="auth">
    <input id="email" type="email" placeholder="email" />
    <button onclick="login()">Login</button>
  </div>

  <div id="user-info" style="display:none">
    Connected as: <span id="user-email"></span>
  </div>

  <hr/>

  <input id="files" type="file" multiple accept="video/*" />
  <button onclick="upload()">Upload</button>

  <p id="status"></p>

  <div id="progress-container">
    <div style="width:100%;background:#eee;border-radius:8px;">
      <div id="progress-bar"></div>
    </div>
  </div>

  <a id="download" style="display:none" target="_blank">Download</a>

  <div id="preview"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./app.js"></script>

<script>
function scrollToApp() {
  document.getElementById("app").scrollIntoView({ behavior: "smooth" })
}
</script>

</body>
</html>
