<!DOCTYPE html>
<html>
<head>
  <title>Talklean</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --coral: #ff5a5f;
      --bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 550px;
      margin: 0 auto;
      padding: 16px;
    }

    .navbar {
      position: sticky;
      top: 0;
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
    }

    .brand {
      font-weight: 800;
      color: var(--coral);
    }

    .nav-cta {
      background: var(--coral);
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 800;
    }

    .hero { margin: 20px 0; }
    .hero h1 { font-size: 22px; }
    .hero p { color: var(--muted); }

    input[type="file"] { display: none; }

    .file-btn {
      display: block;
      text-align: center;
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button {
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 16px;
    }

    .primary {
      background: var(--coral);
      color: white;
      border: none;
      width: 100%;
      margin-bottom: 10px;
    }

    #final-video {
      width: 80%;
      margin: 20px auto;
      display: none;
      border-radius: 12px;
    }

    #action-box {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 10px 0;
    }

    #status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    #spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #ddd;
      border-top: 2px solid var(--coral);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    #progress-container {
      display: none;
      margin: 10px 0;
      background: #eee;
      height: 8px;
      border-radius: 999px;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--coral);
    }

    #preview {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .file-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
    }

    .video-wrapper {
      width: 100%;
      aspect-ratio: 1;
      background: black;
      border-radius: 10px;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

  </style>
</head>

<body>

<div class="navbar">
  <div class="brand">talklean</div>
  <button class="nav-cta" onclick="openFilePicker()">Try now</button>
</div>

<div class="container">

  <div class="hero">
    <h1>Transform your raw videos</h1>
    <p>clean TikTok-ready clips</p>
  </div>

  <!-- FINAL -->
  <video id="final-video" controls playsinline></video>

  <div id="action-box"></div>

  <!-- STATUS -->
  <div id="status-row">
    <div id="spinner"></div>
    <p id="status"></p>
  </div>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <!-- UPLOAD FLOW -->
  <label class="file-btn" id="select-btn" for="fileInput">Select videos</label>
  <input id="fileInput" type="file" multiple accept="video/*">

  <button class="primary" id="generate-btn" onclick="upload()">
    Generate watchable content
  </button>

  <div id="preview"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./app.js"></script>

</body>
</html>
