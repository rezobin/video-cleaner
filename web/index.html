<!DOCTYPE html>
<html>
<head>
  <title>Talklean</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* -------------------------
   RESET
------------------------- */

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui;
  background: #fafafa;
  color: #111;
}

/* -------------------------
   NAVBAR
------------------------- */

.navbar {
  position: sticky;
  top: 0;
  background: white;
  border-bottom: 1px solid #eee;
  padding: 12px 16px;

  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: 700;
  color: #ff5a5f;
}

.cta {
  background: #ff5a5f;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

/* -------------------------
   LAYOUT
------------------------- */

.container {
  padding: 16px;
  max-width: 900px;
  margin: auto;
}

/* -------------------------
   HERO
------------------------- */

.hero {
  margin-top: 20px;
}

.hero h1 {
  font-size: 22px;
  line-height: 1.3;
}

.hero p {
  color: #666;
  margin-bottom: 16px;
}

/* -------------------------
   LOGIN
------------------------- */

.login-box {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}

.login-row {
  display: flex;
  gap: 8px;
}

.login-row input {
  flex: 1;
}

/* -------------------------
   INPUT / BUTTON
------------------------- */

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  width: 100%;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
}

button.primary {
  background: #ff5a5f;
  color: white;
  border: none;
}

/* -------------------------
   UPLOAD
------------------------- */

#upload-section {
  margin-top: 20px;
}

/* -------------------------
   PREVIEW GRID
------------------------- */

#preview {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.file-item {
  width: 100%;
  max-width: 200px;
  margin: auto;
}

video {
  width: 100%;
  max-height: 300px; /* 🔥 important */
  object-fit: cover;
  border-radius: 10px;
}

.video-wrapper {
  width: 100%;
  aspect-ratio: 1 / 1; /* 🔥 carré parfait */
  overflow: hidden;
  border-radius: 12px;
  background: #000;
}

.video-wrapper video {
  width: 100%;
  height: 100%;
  object-fit: cover; /* 🔥 crop intelligent */
}

.file-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.file-actions button {
  flex: 1;
}

/* -------------------------
   PROGRESS
------------------------- */

#progress-container {
  margin-top: 10px;
}

#progress-bar {
  height: 8px;
  width: 0%;
  background: #ff5a5f;
  border-radius: 8px;
}

/* -------------------------
   TABLET / DESKTOP
------------------------- */

@media (min-width: 700px) {

  .hero h1 {
    font-size: 30px;
  }

  #preview {
    grid-template-columns: repeat(2, 1fr);
  }

  .login-row {
    max-width: 400px;
  }
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">talklean</div>
  <button class="cta" onclick="scrollToUpload()">Try now</button>
</div>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h1>Turn raw videos into clean content</h1>
    <p>No editing. No AI weirdness. Just you, without the pauses.</p>

    <!-- LOGIN -->
    <div class="login-box">
      <div id="user-info" style="display:none;">
        Connected as: <span id="user-email"></span>
      </div>

      <div id="login-form" class="login-row">
        <input id="email" type="email" placeholder="email">
        <button onclick="login()">Login</button>
      </div>
    </div>
  </div>

  <!-- UPLOAD -->
  <div id="upload-section">
    <input id="files" type="file" multiple accept="video/*">
    <button class="primary" onclick="upload()">Upload</button>

    <p id="status"></p>

    <div id="progress-container">
      <div style="background:#eee;height:8px;border-radius:8px;">
        <div id="progress-bar"></div>
      </div>
    </div>

    <a id="download" style="display:none" target="_blank">Download</a>
  </div>

  <h3>Preview</h3>
  <div id="preview"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="./app.js"></script>

<script>
function scrollToUpload() {
  document.getElementById("upload-section").scrollIntoView({ behavior: "smooth" })
}
</script>

</body>
</html>
